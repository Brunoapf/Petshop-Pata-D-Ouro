{% extends 'base.html' %}

{% load static %}

{% block title %}
Cliente
{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/clientes.css' %}">
{% endblock %}

{% block content %}

<div class="form-container">

    <div class="form-header">

        <h1>Cadastro de Cliente</h1>

        <p>
            Preencha as informações do cliente
        </p>

    </div>

    <form method="POST" class="custom-form">

        {% csrf_token %}

        <div class="form-group">

            <label>Nome</label>

            {{ form.nome }}

        </div>

        <div class="form-group">

            <label for="id_telefone">
                Telefone
            </label>

            <input 
                type="text"
                name="telefone"
                id="id_telefone"
                maxlength="15"
                placeholder="(83) 99999-9999"
                value="{{ form.telefone.value|default:'' }}"
                oninput="formatarTelefone(this)"
            >

        </div>

        <div class="form-group">

            <label>Email</label>

            {{ form.email }}

        </div>

        <div class="form-group">

            <label>Endereço</label>

            {{ form.endereco }}

        </div>

        <button type="submit" class="btn-save">

            <i class="fa-solid fa-floppy-disk"></i>
            Salvar Cliente

        </button>

    </form>

</div>

<script>

    function formatarTelefone(input) {

        let valor = input.value.replace(/\D/g, '');

        valor = valor.substring(0, 11);

        if (valor.length > 10) {

            valor = valor.replace(
                /^(\d{2})(\d{5})(\d{4}).*/,
                '($1) $2-$3'
            );

        } else if (valor.length > 6) {

            valor = valor.replace(
                /^(\d{2})(\d{4})(\d{0,4}).*/,
                '($1) $2-$3'
            );

        } else if (valor.length > 2) {

            valor = valor.replace(
                /^(\d{2})(\d{0,5})/,
                '($1) $2'
            );

        } else {

            valor = valor.replace(
                /^(\d*)/,
                '($1'
            );
        }

        input.value = valor;
    }

</script>

{% endblock %}
