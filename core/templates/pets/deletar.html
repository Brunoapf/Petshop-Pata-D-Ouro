{% extends 'base.html' %}
{% load static %}

{% block title %}Excluir Pet{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/pets.css' %}">
{% endblock %}

{% block content %}

<div class="delete-container">

    <div class="delete-card">

        <div class="delete-icon">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>

        <h1>Deseja excluir {{ pet.nome }}?</h1>

        <p>
            Essa ação não poderá ser desfeita.
        </p>

        <form method="POST">

            {% csrf_token %}

            <div class="delete-actions">

                <a href="{% url 'listar_pets' %}" class="btn-secondary">
                    Cancelar
                </a>

                <button type="submit" class="btn-delete">
                    Confirmar Exclusão
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
