{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Pata D'Ouro</title>

    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>

<body>

    <main class="container">

        <div class="img-container">
            <img class="logo" src="{% static 'img/logo.png' %}" alt="Logo Pata D'Ouro">
        </div>

        <div class="login">

            <div class="texts">
                <h1 class="title">Bem-vindo!</h1>
                <p>Faça login para continuar</p>
            </div>

            <form method="post" class="form-login">

                {% csrf_token %}

                <div class="form-group">
                    <label class="title-form" for="id_username">
                        Usuário
                    </label>

                    {{ form.username }}
                </div>

                <div class="form-group">
                    <label class="title-form" for="id_password">
                        Senha
                    </label>

                    {{ form.password }}
                </div>

                {% if form.errors %}
                    <p class="error-message">
                        Usuário ou senha inválidos.
                    </p>
                {% endif %}

                <button type="submit" class="btn-login">
                    Entrar
                </button>

            </form>

        </div>

    </main>

</body>
</html>
